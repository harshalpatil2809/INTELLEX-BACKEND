services:
  db:
    image: postgres:15-alpine
    container_name: intellex_db
    restart: always
    environment:
      POSTGRES_USER: postgres    
      POSTGRES_PASSWORD: harshal
      POSTGRES_DB: intellex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: intellex_backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: